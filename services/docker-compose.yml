services:
  # 1. Сервіс продуктів (внутрішній)
  product-service:
    build:
      context: ./Product
      dockerfile: Product/Dockerfile
    container_name: product-service
    ports:
      - "5005:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    networks:
      - simplestore-net
    restart: unless-stopped

  # 2. Сервіс кошика (внутрішній)
  cart-service:
    build:
      context: ./CartService
      dockerfile: CartService/Dockerfile
    container_name: cart-service
    ports:
    - "5010:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    networks:
      - simplestore-net
    restart: unless-stopped

  # 3. Сервіс авторизації (внутрішній)
  # authorization-service:
  #   build:
  #     context: ./Authorization/Authorization
  #     dockerfile: Authorization/Dockerfile
  #   container_name: authorization-service
  #   environment:
  #     - ASPNETCORE_ENVIRONMENT=Development
  #   networks:
  #     - simplestore-net
  #   restart: unless-stopped
  

  # 4. API-шлюз (точка входу для бекенду)
  api-gateway:
    build:
      context: ./ApiGateway
    container_name: api-gateway
    networks:
      - simplestore-net
    ports:
      - "8000:8080"
    depends_on:
      - product-service
      - cart-service
      #- authorization-service
    restart: unless-stopped

  # 5. Фронтенд (новий сервіс)
  simplestore-frontend:
    build:
      context: ../frontend/simpleStoreWeb # <-- Переконайтесь, що назва папки правильна
    container_name: simplestore-frontend
    networks:
      - simplestore-net
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    restart: unless-stopped


  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.2
    container_name: zookeeper
    networks:
      - simplestore-net
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.3.2
    container_name: kafka
    networks:
      - simplestore-net
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Налаштування двох слухачів (Listeners):
      # EXTERNAL (9092) - для доступу з вашого ПК
      # INTERNAL (29092) - для доступу між контейнерами (Product, Cart)
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

    
    
  db:
    container_name: postgres_container
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: test_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - simplestore-net

  # ----------------------------
  # Сервіс Адмінки (pgAdmin)
  # ----------------------------
  pgadmin:
    container_name: pgadmin4_container
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - simplestore-net

  keycloak:
    build:
      context: ./keycloak
    ports:
      - 9080:8080
    environment:
      # Змінні, що змушують Keycloak використовувати localhost:9080 для браузера
      - KC_HOSTNAME=localhost
      - KC_HOSTNAME_PORT=9080
      - KC_HOSTNAME_STRICT=false
      
      # Дозволяємо HTTP для локальної розробки
      - KC_HOSTNAME_STRICT_HTTPS=false
      - KC_HTTP_ENABLED=true
      
      # Вказуємо, що Keycloak працює за проксі (oauth2-proxy/envoy)
      - KC_PROXY=edge
    networks:
      - simplestore-net

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.5.1
    container_name: oauth2-proxy
    command: --http-address=0.0.0.0:4180
    restart: always
    environment:
      OAUTH2_PROXY_PROVIDER: "oidc"
      
      # 1. Змінено Client ID (взято з JSON)
      OAUTH2_PROXY_CLIENT_ID: "democlient"
      
      # 2. Змінено Secret (взято з JSON)
      OAUTH2_PROXY_CLIENT_SECRET: "D8eXp9/1q2w3e4r5t6y7u8i9o0p1a2s3"
      
      # 3. ВИПРАВЛЕНО URL! 
      # Тут має бути внутрішній порт контейнера Keycloak (8080), а не 10000.
      # Також змінено realm на "demorealm".
      OAUTH2_PROXY_OIDC_ISSUER_URL: "http://keycloak:8080/realms/demorealm"
      
      OAUTH2_PROXY_COOKIE_SECRET: "Bk7sL2p9xV4mN8qW3zR6tY1jH5gD0fXc"
      OAUTH2_PROXY_EMAIL_DOMAINS: "*"
      OAUTH2_PROXY_UPSTREAMS: "static://200"
      OAUTH2_PROXY_REVERSE_PROXY: "true"

      OAUTH2_PROXY_LOGIN_URL: "http://localhost:9080/realms/demorealm/protocol/openid-connect/auth"
      OAUTH2_PROXY_REDEEM_URL: "http://keycloak:9080/realms/demorealm/protocol/openid-connect/token"
      OAUTH2_PROXY_VALIDATE_URL: "http://keycloak:9080/realms/demorealm/protocol/openid-connect/userinfo"

      OAUTH2_PROXY_INSECURE_OIDC_SKIP_ISSUER_VERIFICATION: "true"
      #КЛЮЧОВЕ: Кажемо використовувати username як ID, якщо email порожній
      OAUTH2_PROXY_USER_ID_CLAIM: "preferred_username"
      
      #Додаємо область видимості (scope), щоб Keycloak віддав профіль
      OAUTH2_PROXY_SCOPE: "openid profile email"
      OAUTH2_PROXY_WHITELIST_DOMAINS: "localhost:9080,localhost:8888"
      
      OAUTH2_PROXY_COOKIE_SECURE: "false" 
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
    depends_on:
      - keycloak
    networks:
      - simplestore-net

  envoy:
      # Замість build використовуємо готовий образ
      image: envoyproxy/envoy:v1.30-latest 
      container_name: envoy
      ports:
        - "8888:10000"
      volumes:
        # Прокидаємо локальний файл прямо в контейнер
        # Переконайся, що шлях зліва (./envoy/envoy.yaml) правильний для твоєї структури папок
        - ./envoy:/etc/envoy 
      depends_on:
        - oauth2-proxy
      networks:
        - simplestore-net

volumes:
  postgres_data:
  
networks:
  simplestore-net:
    driver: bridge