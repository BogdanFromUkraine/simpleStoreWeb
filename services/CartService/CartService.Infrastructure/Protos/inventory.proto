syntax = "proto3";

option csharp_namespace = "CartService.Infrastructure.Grpc";

package inventory;

service InventoryStorage {
  rpc CheckProductStock (StockRequest) returns (StockResponse);
}

message StockRequest {
  string product_id = 1; 
  int32 requested_quantity = 2;
}

message StockResponse {
  bool is_available = 1;
}